<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
		
	<title>CISC3003 - Practice 06</title>
	<link href="css/styles.css" rel="stylesheet">
</head>

<body>
<div class="title">
    <h1>Shopping Cart</h1>
</div>
<table class="table-fill">
    <thead>
        <tr>
            <th colspan="2">Product</th>
            <th>#</th>
            <th>Price</th>
            <th>Amount</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td><img src="images/106020.jpg" alt='product1'></td>
            <td>Girl with a Pearl Earring</td>
            <td id='count1'>3</td>
            <td id='price1'>$80.00</td>
            <td id='amount1'>$240.00</td>
        </tr>
        <tr>
            <td><img src="images/116010.jpg" alt='product2'></td>
            <td>Artist Holding a Thistle</td>
            <td id='count2'>1</td>
            <td id='price2'>$125.00</td>
            <td id='amount2'>$125.00</td>
        </tr>
        <tr>
            <td><img src="images/120010.jpg" alt='product3'></td>
            <td>Portrait of Eleanor of Toledo</td>
            <td id='count3'>2</td>
            <td id='price3'>$75.00</td>
            <td id='amount3'>$150.00</td>
        </tr>        
        <tr class="totals">
            <td colspan="4">Subtotal</td>
            <td id='subtotal'>$515.00</td>
        </tr>
        <tr class="totals">
            <td colspan="4">Tax</td>
            <td id='tax'>$51.50</td>
        </tr>
        <tr class="totals">
            <td colspan="4">Shipping</td>
            <td id='shipping'>$40.00</td>
        </tr>
        <tr class="totals focus">
            <td colspan="4">Grand Total</td>
            <td id='total'>$606.50</td>
        </tr>
    </tbody>
</table>
<script src="js/data.js"></script>
<script src="js/cisc3003-practice06.js"></script>
</body></html>
